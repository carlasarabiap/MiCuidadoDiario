<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>checklist-higiene</title>
    <link rel="stylesheet" href="/css/style-checklist-higiene.css">
</head>

<body>
    <header class="header-check-list">
        <button class="close" onclick="window.close();">Salir</button>

    </header>

    <div class="vista-check-list">
        <h2>Check-list higiene y confort</h2>

        <!-- Formulario en el archivo HTML -->
        <form action="/app/controllers/checkListController.js" method="POST">
            <!-- Pregunta 1 -->
            <div>
                <div>
                    <label for="question1">¿El cabello lo tiene limpio y peinado?</label>
                    <input type="checkbox" name="question1" value="true" id="question1">
                </div>
            </div>
            <!-- Pregunta 2 -->
            <div>
                <label for="question2">¿Se observa los ojos sin lagañas y sin secreción?</label>
                <input type="checkbox" name="question2" value="true" id="question2">
            </div>
            <!-- Pregunta 3 -->
            <div>
                <label for="question3">¿La nariz esta limpia y sin mucosidad?</label>
                <input type="checkbox" name="question3" value="true" id="question3">
            </div>
            <!-- Pregunta 4 -->
            <div>
                <label for="question4">¿La boca está higienizada?</label>
                <input type="checkbox" name="question4" value="true" id="question4">
            </div>
            <!-- Pregunta 5 -->
            <div>
                <label for="question5">¿Los oídos están limpios e higienizados?</label>
                <input type="checkbox" name="question5" value="true" id="question5">
            </div>
            <!-- Pregunta 6 -->
            <div>
                <label for="question6">¿Detrás de los oídos y el cuello están limpios?</label>
                <input type="checkbox" name="question6" value="true" id="question6">
            </div>
            <!-- Pregunta 7 -->
            <div>
                <label for="question7">¿El cuerpo está limpio?</label>
                <input type="checkbox" name="question7" value="true" id="question7">
            </div>
            <!-- Pregunta 8 -->
            <div>
                <label for="question8">¿La piel está brillante y humectada?</label>
                <input type="checkbox" name="question8" value="true" id="question8">
            </div>
            <!-- Pregunta 9 -->
            <div>
                <label for="question9">¿Las uñas estan limpias y cortas?</label>
                <input type="checkbox" name="question9" value="true" id="question9">
            </div>
            <!-- Pregunta 10 -->
            <div>
                <label for="question10">¿La ropa está limpia?</label>
                <input type="checkbox" name="question10" value="true" id="question10">
            </div>
            <!-- Pregunta 11 -->
            <div>
                <label for="question11">¿Las sábanas están limpias?</label>
                <input type="checkbox" name="question11" value="true" id="question11">
            </div>
            <button type="submit">Enviar</button>
        </form>
    </div>
    <!--<script src="main.js"></script>-->

    <body>

</html>
