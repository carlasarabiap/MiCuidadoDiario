            <div class="form-group">

              <input class="Inputs-L" type="text" 
                id="username"
                name="username" 
                placeholder="Ingresa un Usuario" 
                autocomplete="off"  
                maxlength="15" required>
            </div>
            <div class="form-group">

              maxlength="30" required>
            </div>
            <div class="form-group">

              <input class="Inputs-L"
                type="email" 
                id="email" 
                name="email" 
                placeholder="Ingresa tu correo"
                autocomplete="off"
                maxlength="15" required>
            </div>
            <div class="form-group">
              <button class="button" 
                id="register" 
                type="submit" 
                value="Registrarse">Regístrarse
              </button>
            </div>
          </form>
          <h3> ¿Ya tienes cuenta? Ingresa<a href="/login" onclick="route()">Aquí</a> 
          </h3>
        </div>	
      </section>
